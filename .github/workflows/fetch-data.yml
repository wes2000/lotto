name: Fetch Lottery Data

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch and transform data
        run: node scripts/fetch-and-transform.js

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          files=""
          [ -f data/texas-latest.json ] && files="$files data/texas-latest.json"
          [ -f data/texas-history.json ] && files="$files data/texas-history.json"
          [ -f data/texas-baseline.json ] && files="$files data/texas-baseline.json"
          if [ -n "$files" ]; then
            git add $files
            git diff --staged --quiet || git commit -m "chore: update texas data [skip ci]"
            git push
          else
            echo "No data files to commit."
          fi
